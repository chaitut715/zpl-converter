name: Build ZPL Converter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Windows x64 build
    runs-on: windows-latest

    steps:
      # ---------------------------------------------------------------
      # 1. Source
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 2. Python
      # ---------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ---------------------------------------------------------------
      # 3. Build labelize.exe from source (no pre-built Windows binary)
      # ---------------------------------------------------------------
      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Clone labelize source
        shell: pwsh
        run: |
          if (-not (Test-Path "labelize-src")) {
            git clone https://github.com/GOODBOY008/labelize labelize-src
          }
          Write-Host "Labelize source ready."

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            labelize-src/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('labelize-src/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build labelize from source
        working-directory: labelize-src
        shell: pwsh
        run: |
          cargo build --release
          if ($LASTEXITCODE -ne 0) {
            Write-Error "cargo build failed with exit code $LASTEXITCODE"
            exit 1
          }
          Write-Host "cargo build --release succeeded."

      - name: Copy labelize.exe to assets
        shell: pwsh
        run: |
          $bin = "labelize-src\target\release\labelize.exe"
          if (-not (Test-Path $bin)) {
            Write-Host "Searching for any .exe produced by cargo:"
            Get-ChildItem "labelize-src\target" -Recurse -Filter "labelize.exe" -ErrorAction SilentlyContinue |
              Format-Table FullName, Length
            Write-Error "labelize.exe not found at expected path: $bin"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path assets | Out-Null
          Copy-Item $bin "assets\labelize.exe"
          $size = (Get-Item "assets\labelize.exe").Length
          Write-Host "labelize.exe copied OK — $size bytes"

      # ---------------------------------------------------------------
      # 4. PyInstaller build
      # ---------------------------------------------------------------
      - name: Build with PyInstaller
        run: pyinstaller zpl_converter.spec

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\zpl_converter\zpl_converter.exe")) {
            Write-Error "zpl_converter.exe not found in dist\zpl_converter\"
            exit 1
          }
          Write-Host "Build output OK."
          Get-ChildItem "dist\zpl_converter\" | Format-Table Name, Length

      # ---------------------------------------------------------------
      # 5. Upload application artifact
      # ---------------------------------------------------------------
      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: zpl-converter-windows-x64
          path: dist/zpl_converter/
          if-no-files-found: error
          retention-days: 30

      # ---------------------------------------------------------------
      # 6. Optional: compile Inno Setup installer
      # ---------------------------------------------------------------
      - name: Install Inno Setup 6
        if: hashFiles('installer.iss') != ''
        shell: pwsh
        run: choco install innosetup --yes --no-progress
        continue-on-error: true

      - name: Compile Inno Setup installer
        if: hashFiles('installer.iss') != ''
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Warning "Inno Setup not found — skipping installer build."
            exit 0
          }
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "Installer compiled OK."
        continue-on-error: true

      - name: Upload installer artifact
        if: hashFiles('Output/zpl-converter-setup*.exe') != ''
        uses: actions/upload-artifact@v4
        with:
          name: zpl-converter-installer
          path: Output/zpl-converter-setup*.exe
          if-no-files-found: warn
          retention-days: 30
