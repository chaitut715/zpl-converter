name: Build ZPL Converter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Windows x64 build
    runs-on: windows-latest

    steps:
      # ---------------------------------------------------------------
      # 1. Source
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 2. Python
      # ---------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ---------------------------------------------------------------
      # 3. Build labelize.exe from source (no pre-built Windows binary)
      # ---------------------------------------------------------------
      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Clone labelize source
        shell: pwsh
        run: |
          if (-not (Test-Path "labelize-src")) {
            git clone https://github.com/GOODBOY008/labelize labelize-src
          }
          Write-Host "Labelize source ready."

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            labelize-src/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('labelize-src/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build labelize from source
        working-directory: labelize-src
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Cargo.toml ==="
          cat Cargo.toml
          echo "=== cargo build --release ==="
          cargo build --release
          echo "=== target/release contents ==="
          ls -lh target/release/*.exe 2>/dev/null || ls -lh target/release/ | head -20

      - name: Copy labelize.exe to assets
        shell: bash
        run: |
          set -euo pipefail
          BIN=$(find labelize-src/target/release -maxdepth 1 -name "*.exe" | head -1)
          if [ -z "$BIN" ]; then
            echo "ERROR: No .exe found in labelize-src/target/release/"
            find labelize-src/target -name "*.exe" 2>/dev/null || true
            exit 1
          fi
          echo "Found binary: $BIN"
          mkdir -p assets
          cp "$BIN" assets/labelize.exe
          echo "Copied OK — $(du -h assets/labelize.exe | cut -f1)"

      # ---------------------------------------------------------------
      # 4. PyInstaller build
      # ---------------------------------------------------------------
      - name: Build with PyInstaller
        run: pyinstaller zpl_converter.spec

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\zpl_converter\zpl_converter.exe")) {
            Write-Error "zpl_converter.exe not found in dist\zpl_converter\"
            exit 1
          }
          Write-Host "Build output OK."
          Get-ChildItem "dist\zpl_converter\" | Format-Table Name, Length

      # ---------------------------------------------------------------
      # 5. Upload application artifact
      # ---------------------------------------------------------------
      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: zpl-converter-windows-x64
          path: dist/zpl_converter/
          if-no-files-found: error
          retention-days: 30

      # ---------------------------------------------------------------
      # 6. Optional: compile Inno Setup installer
      # ---------------------------------------------------------------
      - name: Install Inno Setup 6
        if: hashFiles('installer.iss') != ''
        shell: pwsh
        run: choco install innosetup --yes --no-progress
        continue-on-error: true

      - name: Compile Inno Setup installer
        if: hashFiles('installer.iss') != ''
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Warning "Inno Setup not found — skipping installer build."
            exit 0
          }
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "Installer compiled OK."
        continue-on-error: true

      - name: Upload installer artifact
        if: hashFiles('Output/zpl-converter-setup*.exe') != ''
        uses: actions/upload-artifact@v4
        with:
          name: zpl-converter-installer
          path: Output/zpl-converter-setup*.exe
          if-no-files-found: warn
          retention-days: 30
