name: Bug Report
description: Report something that isn't working correctly
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Drop in a ZPL file
        3. Click Render Preview
        4. See error...
    validations:
      required: true

  - type: textarea
    id: zpl
    attributes:
      label: ZPL content (if applicable)
      description: Paste the ZPL that triggers the bug, or a minimal reproduction.
      render: text

  - type: dropdown
    id: os
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - macOS (development)
        - Other
    validations:
      required: true

  - type: dropdown
    id: dpi
    attributes:
      label: DPI setting
      options:
        - "203 (default)"
        - "152"
        - "300"
        - "600"
        - Not applicable

  - type: textarea
    id: logs
    attributes:
      label: Log output
      description: Paste the contents of `%TEMP%\zpl_converter\zpl_converter.log` (Windows) or `/tmp/zpl_converter/zpl_converter.log` (macOS).
      render: text

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "e.g. v1.0.0"
    validations:
      required: true
