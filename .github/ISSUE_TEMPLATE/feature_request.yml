name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought of?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Rendering / ZPL support
        - PDF export
        - Batch processing
        - UI / UX
        - CI / build pipeline
        - macOS support
        - Other
